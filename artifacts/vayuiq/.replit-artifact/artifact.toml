kind = "web"
previewPath = "/"
title = "VayuIQ - Air Quality Intelligence"
version = "1.0.0"
id = "artifacts/vayuiq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21122

[services.development]
run = "pnpm --filter @workspace/vayuiq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vayuiq", "run", "build" ]
publicDir = "artifacts/vayuiq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21122"
BASE_PATH = "/"
